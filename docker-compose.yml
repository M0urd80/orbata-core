services:
  # One-shot: exits 0 after migrations. Email workers use service_completed_successfully
  # (the long-running `core-auth` API never exits, so it cannot satisfy that condition).
  core-auth-migrations:
    build: ./services/core-auth
    command: ["sh", "-c", "alembic upgrade head"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://orbata:orbata@postgres:5432/orbata

  core-auth:
    build: ./services/core-auth
    ports:
      - "8101:8000"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      core-auth-migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Same Postgres for all app services (host = Compose service name `postgres`).
      DATABASE_URL: postgresql+psycopg://orbata:orbata@postgres:5432/orbata

  email-service:
    build: ./services/email-service
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      core-auth-migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://orbata:orbata@postgres:5432/orbata

  email-retry:
    build: ./services/email-service
    command: ["python", "retry_worker.py"]
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      core-auth-migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://orbata:orbata@postgres:5432/orbata

  admin-panel:
    build: ./services/admin-panel
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - core-auth
    env_file:
      - .env
    environment:
      ADMIN_DATABASE_URL: postgresql+psycopg://orbata:orbata@postgres:5432/orbata
      DATABASE_URL: postgresql+psycopg://orbata:orbata@postgres:5432/orbata
      POSTGRES_HOST: postgres
      POSTGRES_DB: orbata
      POSTGRES_USER: orbata
      POSTGRES_PASSWORD: orbata
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      # Optional UUID: when set, new AdminJS clients without a plan get this plan_id
      # DEFAULT_CLIENT_PLAN_ID: 00000000-0000-0000-0000-000000000000

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: orbata
      POSTGRES_PASSWORD: orbata
      POSTGRES_DB: orbata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbata"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
