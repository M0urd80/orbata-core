services:
  core-auth:
    build: ./services/core-auth
    ports:
      - "8101:8000"
    depends_on:
      - redis
      - postgres
    env_file:
      - .env

  email-service:
    build: ./services/email-service
    depends_on:
      - redis
    env_file:
      - .env

  email-retry:
    build: ./services/email-service
    command: ["python", "retry_worker.py"]
    depends_on:
      - redis
    env_file:
      - .env

  admin-panel:
    build: ./services/admin-panel
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: orbata
      POSTGRES_USER: orbata
      POSTGRES_PASSWORD: orbata
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: orbata
      POSTGRES_PASSWORD: orbata
      POSTGRES_DB: orbata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbata"]
      interval: 5s
      timeout: 5s
      retries: 5
